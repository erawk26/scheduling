name = "ke-agenda-sync"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[vars]
# Override in production via `wrangler secret put BETTER_AUTH_URL`
BETTER_AUTH_URL = "http://localhost:3025"

[[d1_databases]]
binding = "DB"
database_name = "ke-agenda-sync"
# Replace with your actual D1 database ID after running:
#   wrangler d1 create ke-agenda-sync
database_id = "REPLACE_WITH_D1_DATABASE_ID"
