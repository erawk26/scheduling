version: 3
sources:
  - name: default
    kind: postgres
    configuration:
      connection_info:
        database_url:
          from_env: DATABASE_URL
        pool_settings:
          max_connections: 50
          idle_timeout: 180
          retries: 1
    customization:
      root_fields:
        namespace: ""
        prefix: ""
        suffix: ""
