# GraphQL Permissions for User Role
# Row-level security enforced via user_id filtering

- table:
    schema: public
    name: auth_user
  select_permissions:
    - role: user
      permission:
        columns:
          - id
          - email
          - email_verified
          - name
          - image
          - created_at
          - updated_at
        filter:
          id:
            _eq: X-Hasura-User-Id
  update_permissions:
    - role: user
      permission:
        columns:
          - name
          - image
        filter:
          id:
            _eq: X-Hasura-User-Id
        check:
          id:
            _eq: X-Hasura-User-Id

