- table:
    schema: public
    name: clients
  select_permissions:
    - role: user
      permission:
        columns:
          - id
          - user_id
          - first_name
          - last_name
          - email
          - phone
          - address
          - latitude
          - longitude
          - notes
          - created_at
          - updated_at
          - version
          - synced_at
          - deleted_at
        filter:
          _and:
            - user_id:
                _eq: X-Hasura-User-Id
            - deleted_at:
                _is_null: true
  insert_permissions:
    - role: user
      permission:
        columns:
          - first_name
          - last_name
          - email
          - phone
          - address
          - latitude
          - longitude
          - notes
        check:
          user_id:
            _eq: X-Hasura-User-Id
  update_permissions:
    - role: user
      permission:
        columns:
          - first_name
          - last_name
          - email
          - phone
          - address
          - latitude
          - longitude
          - notes
        filter:
          _and:
            - user_id:
                _eq: X-Hasura-User-Id
            - deleted_at:
                _is_null: true
        check:
          user_id:
            _eq: X-Hasura-User-Id
  delete_permissions:
    - role: user
      permission:
        filter:
          _and:
            - user_id:
                _eq: X-Hasura-User-Id
            - deleted_at:
                _is_null: true

