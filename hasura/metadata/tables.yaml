- table:
    schema: public
    name: auth_user
  configuration:
    custom_root_fields:
      select: auth_users
      select_by_pk: auth_user
      select_aggregate: auth_users_aggregate
    custom_column_names: {}
  object_relationships:
    - name: user
      using:
        manual_configuration:
          remote_table:
            schema: public
            name: users
          column_mapping:
            id: id
  array_relationships:
    - name: sessions
      using:
        foreign_key_constraint_on:
          column: user_id
          table:
            schema: public
            name: auth_session
    - name: accounts
      using:
        foreign_key_constraint_on:
          column: user_id
          table:
            schema: public
            name: auth_account

- table:
    schema: public
    name: auth_session
  configuration:
    custom_root_fields:
      select: auth_sessions
      select_by_pk: auth_session
      select_aggregate: auth_sessions_aggregate
  object_relationships:
    - name: user
      using:
        foreign_key_constraint_on: user_id

- table:
    schema: public
    name: auth_account
  configuration:
    custom_root_fields:
      select: auth_accounts
      select_by_pk: auth_account
      select_aggregate: auth_accounts_aggregate
  object_relationships:
    - name: user
      using:
        foreign_key_constraint_on: user_id

- table:
    schema: public
    name: users
  configuration:
    custom_root_fields:
      select: users
      select_by_pk: user
      select_aggregate: users_aggregate
  object_relationships:
    - name: auth_user
      using:
        foreign_key_constraint_on: id
  array_relationships:
    - name: clients
      using:
        foreign_key_constraint_on:
          column: user_id
          table:
            schema: public
            name: clients
    - name: services
      using:
        foreign_key_constraint_on:
          column: user_id
          table:
            schema: public
            name: services
    - name: appointments
      using:
        foreign_key_constraint_on:
          column: user_id
          table:
            schema: public
            name: appointments

