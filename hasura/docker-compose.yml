version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ke-agenda-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: keagenda
      POSTGRES_USER: keagenda
      POSTGRES_PASSWORD: keagenda_dev_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  hasura:
    image: hasura/graphql-engine:v2.36.0
    container_name: ke-agenda-hasura
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgresql://keagenda:keagenda_dev_2024@postgres:5432/keagenda
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_DEV_MODE: "true"
      HASURA_GRAPHQL_ENABLED_LOG_TYPES: "startup, http-log, webhook-log, websocket-log, query-log"
      HASURA_GRAPHQL_ADMIN_SECRET: hasura_dev_secret_2024
      HASURA_GRAPHQL_JWT_SECRET: '{"type":"RS256","key":"-----BEGIN PUBLIC KEY-----\nMIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAtzgomOmeRYKFh7BCznoG\nxC02UowGbjqVTLx1ybqTH/jEpZqYbqjPl24hA3NuLi3EZfoHlrirK/LTTYNGukd7\nC6Si4aOB7rwOa3NWwcuFbqtcRpAvGCnF5QXI30bibu0c4M0N8KyhVbf1QtzLmSR/\nlvUoqbEcHlXeTVv95DUxLnvBgAMsMwuxgeJi7qiFokyA4QnpunjXWsIFTZAg2dkK\n/t0+3ePqOzFxeN+sthhQoawS/r5eruKb/g0Si0TOBlXX0u1VV7VqdhcbEDssCfkl\n1RSuz9fnrkioaZ4TK2Y7A4jiQlPKd9kk63ERAkn3MUYw/9bsbh+kpGnmzJp9Ubh+\nIwIDAQAB\n-----END PUBLIC KEY-----","claims_namespace":"https://hasura.io/jwt/claims","issuer":"http://localhost:3000"}'
      HASURA_GRAPHQL_UNAUTHORIZED_ROLE: anonymous
      HASURA_GRAPHQL_CORS_DOMAIN: "*"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: ke-agenda-network
